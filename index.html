<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ЕГЭ Курс</title>
    <style>
        body { font-family: Arial; background: #667eea; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; border-radius: 15px; padding: 20px; }
        .btn { padding: 10px 20px; margin: 5px; cursor: pointer; }
        .btn-primary { background: #3498db; color: white; }
        .task-card { background: #f9f9f9; padding: 15px; margin: 10px 0; border-left: 4px solid #3498db; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Курс ЕГЭ</h1>
        <div id="auth-section">
            <button id="login-btn" class="btn btn-primary">Войти</button>
            <button id="register-btn" class="btn">Регистрация</button>
        </div>
        <div id="user-section" class="hidden">
            <span id="user-name"></span>
            <button id="logout-btn" class="btn">Выйти</button>
        </div>
        <div id="tasks-container"></div>
    </div>

    <script>
        const API_URL = 'https://ege-server-3.onrender.com';
        
        async function apiRequest(endpoint, method, data) {
            const res = await fetch(`${API_URL}${endpoint}`, {
                method, headers: { 'Content-Type': 'application/json' },
                body: data ? JSON.stringify(data) : null
            });
            return res.json();
        }
        
        let currentUser = null;
        
        async function register() {
            const email = prompt('Email:');
            const username = prompt('Имя:');
            const password = prompt('Пароль:');
            const result = await apiRequest('/api/register', 'POST', { email, username, password });
            if (result.success) {
                currentUser = result.user;
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                updateUI();
                loadTasks();
                alert('Регистрация успешна!');
            } else alert(result.message);
        }
        
        async function login() {
            const email = prompt('Email:');
            const password = prompt('Пароль:');
            const result = await apiRequest('/api/login', 'POST', { email, password });
            if (result.success) {
                currentUser = result.user;
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                updateUI();
                loadTasks();
                alert('Вход выполнен!');
            } else alert(result.message);
        }
        
        function logout() {
            currentUser = null;
            localStorage.removeItem('currentUser');
            updateUI();
            loadTasks();
        }
        
        function updateUI() {
            document.getElementById('auth-section').classList.toggle('hidden', currentUser);
            document.getElementById('user-section').classList.toggle('hidden', !currentUser);
            if (currentUser) document.getElementById('user-name').textContent = currentUser.username;
        }
        
        async function loadTasks() {
            const container = document.getElementById('tasks-container');
            const adminData = await apiRequest('/api/admin-data');
            const tasks = adminData?.adminPractice?.[13] || [];
            
            if (tasks.length === 0) {
                container.innerHTML = '<p>Нет заданий. Добавьте их через админ-панель.</p>';
                return;
            }
            
            container.innerHTML = tasks.map(task => `
                <div class="task-card">
                    <h3>${task.source}</h3>
                    <div>${task.question}</div>
                    <button class="btn btn-primary" onclick="alert('Ответ: ${task.answer.replace(/'/g, "\\'")}')">Показать ответ</button>
                </div>
            `).join('');
        }
        
        document.getElementById('login-btn').onclick = login;
        document.getElementById('register-btn').onclick = register;
        document.getElementById('logout-btn').onclick = logout;
        
        const saved = localStorage.getItem('currentUser');
        if (saved) { currentUser = JSON.parse(saved); updateUI(); loadTasks(); }
        else loadTasks();
        
        console.log('Сайт работает!');
    </script>
</body>
</html>
